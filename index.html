<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Roadmap Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        
        .card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.08); 
            padding: 16px; 
            margin-bottom: 16px; 
            cursor: grab; 
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            touch-action: none; 
            border: 2px solid transparent;
        }
        .card:active { cursor: grabbing; }
        .card.dragging { opacity: 0.4; transform: scale(1.02); border-color: #3b82f6; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        .drag-handle { 
            color: #94a3b8; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 4px;
            background: #f8fafc;
            border-radius: 4px;
        }
        
        .card input, .card button, .card select {
            cursor: auto;
        }

        #canvas-container { 
            position: sticky; top: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: white;
            line-height: 0;
            border-radius: 4px;
            overflow: hidden;
        }
        canvas { width: 100%; height: auto; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
    <!-- 左側: 操作パネル -->
    <div class="w-full md:w-1/3 flex flex-col h-screen overflow-hidden">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            プラン編集
        </h1>
        
        <div class="flex-1 overflow-y-auto pr-2 custom-scroll" id="controls">
            <!-- 基本情報カード -->
            <div class="card !cursor-default">
                <h2 class="font-bold border-b pb-2 mb-4 text-blue-600 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    基本情報
                </h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-gray-500 uppercase font-semibold">氏名</label>
                        <input type="text" id="userName" value="江戸川 コナン" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all" oninput="app.update()">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-gray-500 font-semibold">生年月日</label>
                            <input type="text" id="birthDate" value="平成18年4月1日" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" oninput="app.update()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 font-semibold">年齢</label>
                            <input type="number" id="userAge" value="20" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" oninput="app.update()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- プランカードリスト -->
            <div id="plan-list"></div>
            
            <button onclick="app.addPlan()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-400 hover:text-blue-500 hover:border-blue-300 hover:bg-blue-50 transition-all mb-32 font-bold text-sm uppercase tracking-wider">
                + 新しい保障を追加
            </button>
        </div>

        <!-- 左下固定エリア -->
        <div class="py-4 bg-gray-100 mt-auto border-t">
            <button onclick="app.downloadPDF()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-black active:transform active:scale-95 transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                PDF (A4) エクスポート
            </button>
        </div>
    </div>

    <!-- 右側: プレビュー -->
    <div class="w-full md:w-2/3">
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>
</div>

<script>
/**
 * 描画用ライブラリ: ChartRenderer
 */
class ChartRenderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.width = 2480;
        this.height = 3508;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.baseScale = this.width / 800;
    }

    clear() {
        this.ctx.clearRect(0, 0, this.width, this.height);
        this.ctx.fillStyle = '#FFFFFF';
        this.ctx.fillRect(0, 0, this.width, this.height);
    }

    s(val) { return val * this.baseScale; }

    text({ text, x, y, size = 14, color = '#000', bold = false, align = 'left' }) {
        this.ctx.fillStyle = color;
        this.ctx.font = `${bold ? 'bold ' : ''}${this.s(size)}px sans-serif`;
        this.ctx.textAlign = align;
        this.ctx.fillText(text, this.s(x), this.s(y));
    }

    line({ x1, y1, x2, y2, color = '#000', width = 1, dash = [] }) {
        this.ctx.beginPath();
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = this.s(width);
        this.ctx.setLineDash(dash.map(v => this.s(v)));
        this.ctx.moveTo(this.s(x1), this.s(y1));
        this.ctx.lineTo(this.s(x2), this.s(y2));
        this.ctx.stroke();
        this.ctx.setLineDash([]);
    }

    rect({ x, y, w, h, fill = null, stroke = null, lineWidth = 1 }) {
        if (fill) {
            this.ctx.fillStyle = fill;
            this.ctx.fillRect(this.s(x), this.s(y), this.s(w), this.s(h));
        }
        if (stroke) {
            this.ctx.strokeStyle = stroke;
            this.ctx.lineWidth = this.s(lineWidth);
            this.ctx.strokeRect(this.s(x), this.s(y), this.s(w), this.s(h));
        }
    }

    // 画像に基づく新しい描画ロジックの追加
    drawInsuranceShape({ x, y, w, h, color, label, shapeType }) {
        const sx = this.s(x);
        const sy = this.s(y);
        const sw = this.s(w);
        const sh = this.s(h);
        this.ctx.fillStyle = color;
        this.ctx.beginPath();

        if (shapeType === 'rect') {
            // 四角形（定額）
            this.ctx.rect(sx, sy, sw, sh);
        } else if (shapeType === 'trapezoid') {
            // 台形（逓減・変化）
            this.ctx.moveTo(sx, sy);
            this.ctx.lineTo(sx + sw, sy + sh * 0.7); // 右側を少し下げる
            this.ctx.lineTo(sx + sw, sy + sh);
            this.ctx.lineTo(sx, sy + sh);
        } else if (shapeType === 'lifetime') {
            // 杭型（一生涯）
            this.ctx.moveTo(sx, sy);
            this.ctx.lineTo(sx + sw - this.s(20), sy);
            this.ctx.lineTo(sx + sw, sy + sh/2); // 先端を尖らせる
            this.ctx.lineTo(sx + sw - this.s(20), sy + sh);
            this.ctx.lineTo(sx, sy + sh);
        } else {
            // デフォルト：アローバー（既存互換）
            this.ctx.moveTo(sx, sy);
            this.ctx.lineTo(sx + sw - this.s(15), sy);
            this.ctx.lineTo(sx + sw, sy + sh/2);
            this.ctx.lineTo(sx + sw - this.s(15), sy + sh);
            this.ctx.lineTo(sx, sy + sh);
        }

        this.ctx.closePath();
        this.ctx.fill();
        
        if (label) {
            this.ctx.save();
            this.ctx.clip(); // 図形からはみ出さないように
            this.text({ text: label, x: x + 10, y: y + h/2 + 5, size: 14, bold: true });
            this.ctx.restore();
        }
    }

    // 既存互換用
    arrowBar(args) { this.drawInsuranceShape({...args, shapeType: 'arrow'}); }
}

const app = {
    renderer: null,
    plans: [
        { id: 1, type: '死亡保障', name: 'マーケットリンク', amount: '500万円', cost: '13,515', endAge: 55, color: '#A8D600', shape: 'rect' },
        { id: 2, type: '死亡保障', name: '家計保障定期NEO', amount: '5万円/月', cost: '3,145', endAge: 65, color: '#FFD966', shape: 'trapezoid' },
        { id: 3, type: '入院保障', name: 'メディカルKit NEO', amount: '日額5,000円', cost: '1,910', endAge: 65, color: '#F3A8C3', shape: 'lifetime' }
    ],

    init() {
        const canvas = document.getElementById('mainCanvas');
        this.renderer = new ChartRenderer(canvas);
        this.renderPlansUI();
        this.setupDragAndDrop();
        this.update();
    },

    setupDragAndDrop() {
        const container = document.getElementById('plan-list');
        container.addEventListener('dragstart', (e) => {
            const card = e.target.closest('.card');
            if (card) { card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
        });
        container.addEventListener('dragend', (e) => {
            const card = e.target.closest('.card');
            if (card) { card.classList.remove('dragging'); this.syncOrderFromUI(); }
        });
        container.addEventListener('dragover', (e) => { e.preventDefault(); this.handleSort(e.clientY); });

        container.addEventListener('touchstart', (e) => {
            const card = e.target.closest('.card');
            if (card && !['INPUT', 'BUTTON', 'SELECT'].includes(e.target.tagName)) {
                this.touchActiveCard = card; card.classList.add('dragging');
            }
        }, { passive: true });
        container.addEventListener('touchmove', (e) => {
            if (this.touchActiveCard) { e.preventDefault(); this.handleSort(e.touches[0].clientY); }
        }, { passive: false });
        container.addEventListener('touchend', (e) => {
            if (this.touchActiveCard) { this.touchActiveCard.classList.remove('dragging'); this.touchActiveCard = null; this.syncOrderFromUI(); }
        });
    },

    handleSort(clientY) {
        const container = document.getElementById('plan-list');
        const draggingCard = container.querySelector('.dragging');
        if (!draggingCard) return;
        const siblings = [...container.querySelectorAll('.card:not(.dragging)')];
        const nextSibling = siblings.find(sibling => {
            const box = sibling.getBoundingClientRect();
            return clientY <= box.top + box.height / 2;
        });
        if (nextSibling !== draggingCard.nextSibling) container.insertBefore(draggingCard, nextSibling);
    },

    syncOrderFromUI() {
        const container = document.getElementById('plan-list');
        const cardElements = [...container.querySelectorAll('.card')];
        const newOrderIds = cardElements.map(el => parseInt(el.dataset.id));
        this.plans = newOrderIds.map(id => this.plans.find(p => p.id === id));
        this.update();
    },

    addPlan() {
        const id = Date.now();
        this.plans.push({ id, type: '保障', name: '新プラン', amount: '100万円', cost: '1,000', endAge: 65, color: '#e2e8f0', shape: 'rect' });
        this.renderPlansUI();
        this.update();
    },

    removePlan(id) {
        this.plans = this.plans.filter(p => p.id !== id);
        this.renderPlansUI();
        this.update();
    },

    renderPlansUI() {
        const list = document.getElementById('plan-list');
        list.innerHTML = '';
        this.plans.forEach((plan) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.draggable = true;
            div.dataset.id = plan.id;
            div.innerHTML = `
                <div class="flex items-center gap-3 mb-3">
                    <div class="drag-handle h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                    </div>
                    <div class="flex-1">
                        <select class="font-bold text-sm text-blue-600 bg-transparent border-none p-0 outline-none focus:ring-0 cursor-pointer" onchange="app.updatePlan(${plan.id}, 'type', this.value)">
                            <option value="死亡保障" ${plan.type === '死亡保障' ? 'selected' : ''}>死亡保障</option>
                            <option value="入院保障" ${plan.type === '入院保障' ? 'selected' : ''}>入院保障</option>
                            <option value="がん保障" ${plan.type === 'がん保障' ? 'selected' : ''}>がん保障</option>
                            <option value="就業不能" ${plan.type === '就業不能' ? 'selected' : ''}>就業不能</option>
                        </select>
                    </div>
                    <button onclick="app.removePlan(${plan.id})" class="text-gray-300 hover:text-red-500 transition-colors p-1" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                </div>
                <div class="space-y-3" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                    <div class="grid grid-cols-2 gap-2 items-end">
                        <div class="space-y-1">
                            <label class="text-[10px] text-gray-400 font-bold ml-1 uppercase">グラフの形</label>
                            <select class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" onchange="app.updatePlan(${plan.id}, 'shape', this.value)">
                                <option value="rect" ${plan.shape === 'rect' ? 'selected' : ''}>■ 定額 (四角)</option>
                                <option value="trapezoid" ${plan.shape === 'trapezoid' ? 'selected' : ''}>▲ 逓減 (台形)</option>
                                <option value="lifetime" ${plan.shape === 'lifetime' ? 'selected' : ''}>▶ 終身 (杭型)</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] text-gray-400 font-bold ml-1 uppercase">色</label>
                            <input type="color" value="${plan.color}" class="w-full h-9 rounded border cursor-pointer p-0 overflow-hidden" oninput="app.updatePlan(${plan.id}, 'color', this.value)">
                        </div>
                    </div>
                    
                    <input type="text" value="${plan.name}" placeholder="保険名 (例: マーケットリンク)" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all" oninput="app.updatePlan(${plan.id}, 'name', this.value)">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1">
                            <label class="text-[10px] text-gray-400 font-bold ml-1 uppercase">${plan.shape === 'trapezoid' ? '開始額' : '保障額'}</label>
                            <input type="text" value="${plan.amount}" placeholder="500万円" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" oninput="app.updatePlan(${plan.id}, 'amount', this.value)">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] text-gray-400 font-bold ml-1 uppercase">保険料</label>
                            <input type="text" value="${plan.cost}" placeholder="10,000" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" oninput="app.updatePlan(${plan.id}, 'cost', this.value)">
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 pt-1">
                        <div class="flex items-center gap-2 w-full">
                            <span class="text-[10px] text-gray-400 font-bold uppercase whitespace-nowrap">終了年齢:</span>
                            <input type="number" value="${plan.endAge}" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" oninput="app.updatePlan(${plan.id}, 'endAge', this.value)">
                            <span class="text-xs text-gray-400">歳</span>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(div);
        });
    },

    updatePlan(id, key, value) {
        const plan = this.plans.find(p => p.id === id);
        if (plan) {
            plan[key] = key === 'endAge' ? parseInt(value) || 0 : value;
            if (key === 'shape') this.renderPlansUI(); // ラベル切り替えのためUI再描画
            this.update();
        }
    },

    update() {
        const r = this.renderer;
        const name = document.getElementById('userName').value;
        const birth = document.getElementById('birthDate').value;
        const age = document.getElementById('userAge').value || 0;
        r.clear();

        // ヘッダー
        r.text({ text: '【おすすめプラン】', x: 40, y: 50, size: 22, bold: true });
        r.text({ text: `${name} 様`, x: 40, y: 100, size: 20, bold: true });
        r.text({ text: `${birth} 生`, x: 250, y: 100, size: 16 });
        r.text({ text: `${age} 歳`, x: 450, y: 100, size: 18, bold: true });
        
        const total = this.plans.reduce((sum, p) => sum + (parseInt(p.cost.replace(/,/g, '')) || 0), 0);
        r.text({ text: '合計保険料：', x: 550, y: 100, size: 18 });
        r.text({ text: `${total.toLocaleString()}円/月`, x: 650, y: 100, size: 22, bold: true });

        // タイムライン設定
        const startAge = parseInt(age);
        const maxAge = 100;
        const xStart = 120;
        const xEnd = 750;
        const yAxis = 950;
        const ageToX = (a) => {
            const ratio = (a - startAge) / (maxAge - startAge);
            return xStart + (xEnd - xStart) * Math.min(1.1, Math.max(0, ratio));
        };

        // 軸描画
        r.line({ x1: xStart, y1: yAxis, x2: xEnd + 20, y2: yAxis, width: 2 });
        [startAge, 55, 65, 70, 100].forEach(a => {
            const x = ageToX(a);
            r.line({ x1: x, y1: yAxis, x2: x, y2: 120, color: '#ddd', width: 1, dash: [5, 5] });
            r.text({ text: a === 100 ? '一生涯' : `${a}歳`, x: x, y: yAxis + 25, size: 14, align: 'center' });
        });

        // 保障内容の描画
        this.plans.forEach((plan, i) => {
            const y = 180 + (i * 180);
            const w = ageToX(plan.endAge) - xStart;
            
            r.text({ text: `【${plan.type}】`, x: 30, y: y + 20, size: 14, bold: true });
            r.text({ text: `☆${plan.name}`, x: 120, y: y - 10, size: 14, color: '#333' });
            
            // 図形タイプに合わせて描画
            r.drawInsuranceShape({ 
                x: xStart, y: y, w: w, h: 80, 
                color: plan.color, 
                label: plan.amount, 
                shapeType: plan.shape 
            });

            // 保険料ライン
            r.text({ text: `${plan.cost}円/月`, x: xStart, y: y + 100, size: 14 });
            const lineEndX = xStart + w;
            r.line({ x1: xStart + 80, y1: y + 95, x2: lineEndX, y2: y + 95, width: 1.5 });
            r.line({ x1: lineEndX, y1: y + 95, x2: lineEndX - 10, y2: y + 90 });
            r.line({ x1: lineEndX, y1: y + 95, x2: lineEndX - 10, y2: y + 100 });
            
            if (plan.shape !== 'lifetime' && plan.endAge < 100) {
                r.text({ text: `${plan.endAge}歳`, x: lineEndX + 10, y: y + 100, size: 14 });
            } else if (plan.shape === 'lifetime' || plan.endAge >= 100) {
                r.text({ text: `終身払い`, x: lineEndX + 10, y: y + 100, size: 14 });
            }
        });
    },

    async downloadPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = this.renderer.canvas.toDataURL('image/png', 1.0);
        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
        pdf.save(`${document.getElementById('userName').value}_保険プラン.pdf`);
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
